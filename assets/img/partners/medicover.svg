    <path d="M28 46 Q50 14, 75 10 Q100 14, 122 46" stroke="#005ca9" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M36 48 Q55 22, 75 18 Q95 22, 114 48" stroke="#005ca9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Person head -->
