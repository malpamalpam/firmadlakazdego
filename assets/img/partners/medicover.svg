<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <g transform="translate(5,0)">
    <!-- Three arcs above person -->
    <path d="M18 48 Q45 0, 75 -4 Q105 0, 132 48" stroke="#005ca9" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M28 48 Q50 8, 75 4 Q100 8, 122 48" stroke="#005ca9" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <path d="M38 48 Q55 18, 75 14 Q95 18, 112 48" stroke="#005ca9" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Head circle -->
    <circle cx="75" cy="28" r="6" fill="#005ca9"/>
    <!-- Body — wide V shape arms -->
    <path d="M28 72 C32 50, 50 40, 75 38 C100 40, 118 50, 122 72" stroke="#005ca9" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Inner body line -->
    <path d="M55 72 L75 52 L95 72" stroke="#005ca9" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text MEDICOVER -->
  <text x="155" y="55" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#005ca9" letter-spacing="2">MEDICOVER</text>
</svg>
